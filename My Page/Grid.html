<html>
    <head>
        <title>Grid</title>

    <style>
        .container{
            width: 80%;
            margin: auto;
            background-color: azure;
            height: 100vh;
            display: grid;
            /* grid-template-columns: 1fr 1fr 1fr 1fr; 
            grid-template-rows: 80px 120px 500px 1fr ; */
            row-gap: 2px;
            column-gap: 2px;
            justify-content: center;

                                 "box2 box3 box3  box3"
                                 "box2 box3 box3  box3"
                                 "box4 box5 box6  box7"
                                 "box8 box8 box9  box9 "  ;

        }
        .box{
            padding: 5PX;

        }

        .box1{
            grid-area: box1;

            /* grid-column-start: 1;
            grid-column-end: 5; */
            
        }
        .box2{
            grid-area: box2;
            background-color: rgb(2, 66, 139);
         
        }
          .box3{
            grid-area: box3;
            background-color: rgb(8, 177, 58);
            
        }
          .box4{

        }
           .box5{

            background-color: rgb(219, 16, 43);
           
        }
         .box6{

            background-color: rgb(10, 6, 7);

         .box7{

            /* grid-column-start: 2;

        .box8{
            grid-area: box8;

             /* grid-column-start: 1;

             */

        .box9{
            grid-area: box9;
            background-color: rgb(185, 120, 136);
               /* grid-column-start: 1;

        }





    </style>
